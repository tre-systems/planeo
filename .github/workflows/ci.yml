name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Verify (prettier check, lint, tsc, diagrams, unit tests)
        run: npm run verify:ci

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    # Non-gating: runs in parallel with `check` and is not a dependency of
    # `deploy`. The Playwright webServer builds with OpenNext and serves the
    # full Workers runtime on localhost:8787, so no secrets are required.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare
    needs: check
    # Deploys are PAUSED — planeo is intentionally offline while in development.
    # Re-enable by setting the repo variable DEPLOY_ENABLED to "true"
    # (`gh variable set DEPLOY_ENABLED --body true`), or by removing the
    # `vars.DEPLOY_ENABLED == 'true' &&` guard below.
    if: vars.DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Build (OpenNext)
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx opennextjs-cloudflare build
      - name: Deploy
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Deploy skipped (no token)
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "CLOUDFLARE_API_TOKEN not set — skipping deploy. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID under repo Settings → Secrets and variables → Actions to enable auto-deploy."
