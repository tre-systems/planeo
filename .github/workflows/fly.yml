name: CI / Fly Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - name: Verify (prettier, lint, tsc)
        run: npm run verify

  deploy:
    name: Deploy to Fly.io
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --dockerfile Dockerfile --remote-only
      - name: Deploy skipped (no token)
        if: env.FLY_API_TOKEN == ''
        run: echo "FLY_API_TOKEN is not set — skipping deploy. Add it under repo Settings → Secrets and variables → Actions to enable auto-deploy."
